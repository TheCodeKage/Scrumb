{% extends "base.html" %}
{% block content %}

<div class="container" style="max-width: 700px;">
    <h2>Create a New Project</h2>
    <p class="text-muted">
        Describe your project idea. We’ll analyze it and suggest MVP features.
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Project Title</label>
            {{ form.title }}
            {{ form.title.errors }}
        </div>

        <div class="mb-3">
            <label class="form-label">Project Description</label>
            {{ form.description }}
            {{ form.description.errors }}
        </div>

        <button type="submit" class="btn btn-primary">
            Analyze with AI 🚀
        </button>
    </form>
</div>

{% endblock %}
